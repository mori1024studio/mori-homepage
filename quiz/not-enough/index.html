<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORI — 你的「不夠好」從哪裡來？</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Noto+Sans+TC:wght@300;400;700&family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-tc-webfont@1.0.0/style.css" rel="stylesheet">
<link rel="stylesheet" href="/shared/style.css">
<style>
/* v1.0 | 2026-06-23 | 自我價值測驗：你的不夠好從哪裡來 · T7 核心解鎖 */

/* ── 頁面骨架 ── */
#site { min-height: 100vh; display: flex; flex-direction: column; }
.quiz-main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 100px 24px 80px;
}

/* ── 畫面切換 ── */
.screen {
  width: 100%; max-width: 640px;
  opacity: 0; transform: translateY(20px);
  transition: opacity .5s ease, transform .5s ease;
  pointer-events: none; position: absolute;
}
.screen.active { opacity: 1; transform: translateY(0); pointer-events: auto; position: relative; }

/* ── 開始畫面 ── */
.start-eyebrow {
  font-family: 'Noto Sans TC', sans-serif; font-size: 9px;
  letter-spacing: .5em; color: rgba(196,169,106,.55); margin-bottom: 20px;
  text-transform: uppercase;
}
.start-title {
  font-family: var(--font-display); font-weight: 900; font-size: 52px;
  background: linear-gradient(160deg, #FFF 0%, #D4B878 50%, #C4A96A 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.15; margin-bottom: 28px;
}
.start-desc {
  font-family: 'LXGW WenKai TC', serif; font-size: 16px; line-height: 2;
  color: rgba(237,232,223,.55); margin-bottom: 48px;
}
.start-meta {
  font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: .25em;
  color: rgba(154,140,120,.4); margin-bottom: 48px;
}
.btn-start {
  display: inline-flex; align-items: center; gap: 16px;
  font-family: var(--font-body); font-size: 16px; letter-spacing: .25em; color: var(--gold);
  background: transparent; border: 1px solid rgba(196,169,106,.25);
  padding: 14px 36px; cursor: none; transition: all .3s;
}
.btn-start:hover { border-color: var(--gold); background: rgba(196,169,106,.06); }
.btn-start-arrow { display: block; width: 28px; height: 1px; background: var(--gold); transition: width .3s; }
.btn-start:hover .btn-start-arrow { width: 44px; }

/* ── 進度條 ── */
.progress-wrap { margin-bottom: 40px; }
.progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-num { font-family: 'Kaushan Script', cursive; font-size: 22px; color: var(--gold); }
.progress-total { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .3em; color: rgba(154,140,120,.45); text-transform: uppercase; }
.progress-bar-bg { height: 1px; background: rgba(196,169,106,.1); position: relative; overflow: visible; }
.progress-bar-fill { height: 1px; background: var(--gold); transition: width .6s cubic-bezier(.4,0,.2,1); position: relative; }
.progress-bar-fill::after { content: ''; position: absolute; right: -3px; top: -3px; width: 7px; height: 7px; background: var(--gold); border-radius: 50%; }

/* ── 問題 ── */
.question-tag { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .4em; color: rgba(196,169,106,.4); text-transform: uppercase; margin-bottom: 20px; }
.question-text { font-family: 'LXGW WenKai TC', serif; font-size: 24px; line-height: 1.75; color: var(--text); margin-bottom: 36px; }

/* ── 選項 ── */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 14px 18px;
  background: rgba(16,12,8,.6); border: 1px solid rgba(196,169,106,.1);
  cursor: none; transition: all .25s; position: relative; overflow: hidden;
}
.option::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--gold); transform: scaleY(0); transform-origin: bottom; transition: transform .3s; }
.option:hover { border-color: rgba(196,169,106,.28); background: rgba(16,12,8,.85); }
.option:hover::before { transform: scaleY(1); }
.option.selected { border-color: rgba(196,169,106,.4); background: rgba(196,169,106,.06); pointer-events: none; }
.option.selected::before { transform: scaleY(1); }
.option.fade-out { opacity: .25; transform: translateX(-6px); }
.option-key { font-family: 'Kaushan Script', cursive; font-size: 18px; color: rgba(196,169,106,.4); flex-shrink: 0; width: 20px; transition: color .25s; }
.option:hover .option-key, .option.selected .option-key { color: var(--gold); }
.option-text { font-family: 'LXGW WenKai TC', serif; font-size: 15px; line-height: 1.7; color: rgba(237,232,223,.7); transition: color .25s; }
.option:hover .option-text, .option.selected .option-text { color: var(--text); }

/* ── 返回按鈕 ── */
.quiz-nav { display: flex; align-items: center; margin-top: 24px; }
.btn-prev-q {
  background: transparent; border: 1px solid var(--border);
  border-radius: 100px; padding: 10px 22px;
  font-size: 13px; color: var(--muted); cursor: none;
  font-family: var(--font-ui); transition: border-color .3s, color .3s;
}
.btn-prev-q:hover { border-color: rgba(196,169,106,.35); color: var(--text); }
/* ── 副業意象調查門 ── */
.survey-type-teaser { text-align: center; margin-bottom: 28px; }
.survey-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.survey-type-name { font-size: clamp(24px,5vw,34px); font-weight: 900; background: linear-gradient(135deg,#fff 30%,var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
.survey-type-brief { font-size: 14px; color: var(--muted); line-height: 1.6; }
.survey-divider { text-align: center; font-size: 11px; letter-spacing: .1em; color: var(--muted); margin: 24px 0 20px; }
.survey-group { margin-bottom: 24px; }
.survey-q { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.5; }
.survey-opts { display: flex; flex-direction: column; gap: 8px; }
.survey-opt { background: rgba(28,28,42,.6); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; font-family: var(--font-ui); font-size: 13px; color: var(--muted); cursor: none; text-align: left; transition: border-color .2s, color .2s; }
.survey-opt:hover { border-color: rgba(196,169,106,.3); color: var(--text); }
.survey-opt.picked { border-color: var(--gold); color: var(--text); background: rgba(196,169,106,.08); }
.btn-unlock { width: 100%; padding: 16px; background: linear-gradient(135deg,var(--gold),var(--gold-b)); color: #0A0A0F; font-family: var(--font-ui); font-size: 15px; font-weight: 900; border: none; border-radius: 100px; cursor: none; margin-top: 8px; opacity: .35; pointer-events: none; transition: opacity .25s; }
.btn-unlock:not([disabled]) { opacity: 1; pointer-events: auto; }

/* ── 結果畫面基礎 ── */
.result-eyebrow { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .5em; color: rgba(196,169,106,.45); text-transform: uppercase; margin-bottom: 16px; }
.result-type { font-family: var(--font-display); font-weight: 900; font-size: 64px; background: linear-gradient(160deg, #FFF 0%, #D4B878 50%, #C4A96A 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; margin-bottom: 8px; }
.result-subtitle { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; letter-spacing: .35em; color: rgba(196,169,106,.6); text-transform: uppercase; margin-bottom: 32px; }
.result-divider { width: 48px; height: 1px; background: rgba(196,169,106,.25); margin-bottom: 32px; }
.result-desc { font-family: 'LXGW WenKai TC', serif; font-size: 17px; line-height: 2; color: rgba(237,232,223,.65); margin-bottom: 40px; }
.result-actions { display: flex; gap: 16px; flex-wrap: wrap; }
.btn-share, .btn-retry { padding: 12px 28px; font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: .25em; text-transform: uppercase; cursor: none; transition: all .25s; }
.btn-share { background: rgba(196,169,106,.1); border: 1px solid rgba(196,169,106,.35); color: var(--gold); }
.btn-share:hover { background: rgba(196,169,106,.18); }
.btn-retry { background: transparent; border: 1px solid rgba(196,169,106,.12); color: rgba(154,140,120,.6); }
.btn-retry:hover { color: rgba(154,140,120,.9); border-color: rgba(196,169,106,.25); }
/* ── 社群按鈕 ── */
.btn-row { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
.btn-sec-row { display: flex; gap: 10px; }
.btn-line { display: flex; align-items: center; justify-content: center; gap: 10px; background: #06C755; color: #fff; border: none; border-radius: 100px; padding: 16px; font-size: 15px; font-weight: 900; cursor: none; font-family: var(--font-ui); transition: opacity .2s; width: 100%; }
.btn-line:hover { opacity: .88; }
.btn-ghost-sec { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; background: transparent; border: 1.5px solid var(--border); border-radius: 100px; padding: 13px 16px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: none; font-family: var(--font-ui); transition: border-color .2s, color .2s; }
.btn-ghost-sec:hover { border-color: rgba(196,169,106,.35); color: var(--text); }
.btn-ghost-full { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; background: transparent; border: 1.5px solid var(--border); border-radius: 100px; padding: 13px 16px; font-size: 13px; font-weight: 700; color: var(--muted); cursor: none; font-family: var(--font-ui); transition: border-color .2s, color .2s; }
.btn-ghost-full:hover { border-color: rgba(196,169,106,.35); color: var(--text); }
.btn-ghost-full:disabled { opacity: .4; pointer-events: none; }
#pdf-target { position: fixed; top: -9999px; left: -9999px; width: 390px; display: none; }
/* ── 深度分析區塊 ── */
.result-analysis-block { margin-bottom: 32px; }
.result-analysis-label { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .4em; color: rgba(196,169,106,.45); text-transform: uppercase; margin-bottom: 14px; }
.result-analysis-text { font-family: 'LXGW WenKai TC', serif; font-size: 15px; line-height: 2; color: rgba(237,232,223,.62); white-space: pre-line; }
.result-morview-block { margin-bottom: 32px; padding: 20px; border-left: 2px solid rgba(196,169,106,.3); background: rgba(196,169,106,.04); }
.result-morview-label { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .4em; color: rgba(196,169,106,.45); text-transform: uppercase; margin-bottom: 12px; }
.result-morview-text { font-family: 'LXGW WenKai TC', serif; font-size: 14px; line-height: 2; color: rgba(196,169,106,.75); white-space: pre-line; }

/* ── Email CTA ── */
.result-cta { margin-top: 40px; padding: 24px; border: 1px solid rgba(196,169,106,.1); background: rgba(16,12,8,.5); }
.result-cta-label { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .4em; color: rgba(196,169,106,.4); text-transform: uppercase; margin-bottom: 12px; }
.result-cta-text { font-family: 'LXGW WenKai TC', serif; font-size: 15px; line-height: 1.8; color: rgba(237,232,223,.55); margin-bottom: 16px; }
.email-form { display: flex; gap: 8px; }
.email-input { flex: 1; padding: 10px 14px; background: rgba(9,7,5,.8); border: 1px solid rgba(196,169,106,.2); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 13px; outline: none; transition: border-color .25s; }
.email-input:focus { border-color: rgba(196,169,106,.45); }
.email-input::placeholder { color: rgba(154,140,120,.35); }
.btn-email { padding: 10px 20px; background: rgba(196,169,106,.12); border: 1px solid rgba(196,169,106,.3); color: var(--gold); font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: .2em; text-transform: uppercase; cursor: none; white-space: nowrap; transition: all .25s; }
.btn-email:hover { background: rgba(196,169,106,.2); }

/* ════════════════════════════════════════
   T7 核心解鎖 — Core Unlock Animation
   輕柔版 · 主題：脆弱 · 低刺激
   ════════════════════════════════════════ */
.core-wrap {
  position: relative; margin: 32px auto 40px;
  width: 180px; height: 180px;
}

/* 6 條射線 */
.core-ray {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 1px; margin-left: -.5px;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(196,169,106,.07) 22%,
    rgba(196,169,106,.18) 50%,
    rgba(196,169,106,.07) 78%,
    transparent 100%
  );
  transform-origin: center;
  transform: rotate(var(--angle));
  opacity: 0;
}

/* 3 層同心環 */
.core-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(196,169,106,.18);
  opacity: 0; transform: scale(.65);
}
.core-ring.r1 { inset: 30%; }
.core-ring.r2 { inset: 15%; }
.core-ring.r3 { inset: 0; }

/* 中心光暈 */
.core-glow {
  position: absolute; inset: 18%; border-radius: 50%;
  background: radial-gradient(circle at center, rgba(196,169,106,.22) 0%, transparent 70%);
  opacity: 0;
}

/* 中心點 */
.core-dot {
  position: absolute; left: 50%; top: 50%;
  width: 8px; height: 8px; margin: -4px 0 0 -4px; border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 10px rgba(196,169,106,.9), 0 0 28px rgba(196,169,106,.35);
  opacity: 0; transform: scale(0);
}

/* 觸發後動畫（類別加上 .is-unlocking）*/
.core-wrap.is-unlocking .core-ray {
  animation: coreRay .9s ease forwards var(--delay, 0s);
}
.core-wrap.is-unlocking .core-ring.r1 {
  animation: coreRing .55s cubic-bezier(.34,1.2,.64,1) forwards .28s;
}
.core-wrap.is-unlocking .core-ring.r2 {
  animation: coreRing .55s cubic-bezier(.34,1.2,.64,1) forwards .48s;
}
.core-wrap.is-unlocking .core-ring.r3 {
  animation: coreRing .55s cubic-bezier(.34,1.2,.64,1) forwards .68s;
}
.core-wrap.is-unlocking .core-glow {
  animation: coreGlow 1.8s ease forwards .75s;
}
.core-wrap.is-unlocking .core-dot {
  animation: coreDot .5s cubic-bezier(.34,1.5,.64,1) forwards .08s;
}

@keyframes coreRay  { from{opacity:0} to{opacity:1} }
@keyframes coreRing { from{opacity:0;transform:scale(.65)} to{opacity:1;transform:scale(1)} }
@keyframes coreGlow { 0%{opacity:0} 40%{opacity:1} 100%{opacity:.5} }
@keyframes coreDot  { from{opacity:0;transform:scale(0)} to{opacity:1;transform:scale(1)} }

/* 結果文字延遲淡入 */
.result-text-block {
  opacity: 0; transform: translateY(10px);
  transition: opacity .8s ease, transform .8s ease;
}
.result-text-block.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="god-ray"></div>
<div id="vignette"></div>

<!-- Preloader -->
<div id="preloader">
  <div id="pre-top"></div>
  <div id="pre-bot"></div>
  <div id="pre-corner-tl"></div>
  <div id="pre-corner-br"></div>
  <div id="pre-center">
    <div class="pre-line" id="line-l"></div>
    <span id="pre-text">Loading</span>
    <div class="pre-line" id="line-r"></div>
  </div>
</div>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<div id="site">

  <nav>
    <a href="/" class="logo" style="text-decoration:none">Mori</a>
    <div class="nav-links">
      <a href="https://instagram.com/mori1024_" target="_blank">Instagram</a>
      <a href="#" target="_blank">Line</a>
    </div>
  </nav>

  <main class="quiz-main">

    <!-- 開始畫面 -->
    <div class="screen active" id="screen-start">
      <div class="gothic-arch" style="position:relative;width:100%;height:50px;margin-bottom:8px">
        <svg viewBox="0 0 1440 90" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,90 L0,60 Q180,0 360,40 Q540,70 720,20 Q900,-20 1080,40 Q1260,80 1440,55 L1440,90 Z" fill="rgba(196,169,106,0.04)"/>
          <path d="M720,20 L716,0 L720,4 L724,0 Z" fill="rgba(196,169,106,0.3)"/>
        </svg>
      </div>
      <div class="ornament" style="margin-bottom:36px">
        <span class="orn-line orn-line-l"></span>
        <span class="orn-diamond"></span>
        <span class="orn-line orn-line-r"></span>
      </div>
      <p class="start-eyebrow">Mori Studio · 心理探索</p>
      <h1 class="start-title" id="quiz-title"></h1>
      <p class="start-desc" id="quiz-desc"></p>
      <p class="start-meta" id="quiz-meta"></p>
      <button class="btn-start" onclick="startQuiz()">
        開始探索
        <span class="btn-start-arrow"></span>
      </button>
    </div>

    <!-- 作答畫面 -->
    <div class="screen" id="screen-quiz">
      <div class="progress-wrap">
        <div class="progress-label">
          <span class="progress-num" id="q-num">Q1</span>
          <span class="progress-total" id="q-total">/ 8 題</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <p class="question-tag" id="q-tag"></p>
      <p class="question-text" id="q-text"></p>
      <div class="options" id="options-wrap"></div>
      <div class="quiz-nav">
        <button class="btn-prev-q" id="btnPrev" onclick="prevQ()">← 返回首頁</button>
      </div>
    </div>

    <!-- ── 畫面：副業意象調查 ── -->
    <div class="screen" id="screen-survey">
      <div class="survey-type-teaser">
        <p class="survey-eyebrow">你的結果出來了</p>
        <h2 class="survey-type-name" id="s-type-name"></h2>
        <p class="survey-type-brief" id="s-type-brief"></p>
      </div>
      <div class="survey-divider">✦ 最後 3 個問題，讓我給你更精準的分析</div>
      <div class="survey-group">
        <p class="survey-q">你目前的副業狀態是？</p>
        <div class="survey-opts">
          <button class="survey-opt" onclick="surveyPick(1,'A',this)">還沒有任何嘗試，但很想開始</button>
          <button class="survey-opt" onclick="surveyPick(1,'B',this)">有想法但一直沒有行動</button>
          <button class="survey-opt" onclick="surveyPick(1,'C',this)">嘗試了一些，還沒有穩定收入</button>
          <button class="survey-opt" onclick="surveyPick(1,'D',this)">已有穩定副業收入</button>
        </div>
      </div>
      <div class="survey-group">
        <p class="survey-q">你最想靠副業實現什麼？</p>
        <div class="survey-opts">
          <button class="survey-opt" onclick="surveyPick(2,'A',this)">每月多 1-2 萬，補充主業收入</button>
          <button class="survey-opt" onclick="surveyPick(2,'B',this)">達到財務自由，完全靠副業生活</button>
          <button class="survey-opt" onclick="surveyPick(2,'C',this)">做有意義的事，不只為了錢</button>
          <button class="survey-opt" onclick="surveyPick(2,'D',this)">建立一個可規模化的一人事業</button>
        </div>
      </div>
      <div class="survey-group">
        <p class="survey-q">你每天能投入副業的時間大約是？</p>
        <div class="survey-opts">
          <button class="survey-opt" onclick="surveyPick(3,'A',this)">1 小時以內</button>
          <button class="survey-opt" onclick="surveyPick(3,'B',this)">1–2 小時</button>
          <button class="survey-opt" onclick="surveyPick(3,'C',this)">3 小時以上</button>
          <button class="survey-opt" onclick="surveyPick(3,'D',this)">可以全力投入</button>
        </div>
      </div>
      <button class="btn-unlock" id="btnUnlock" onclick="unlockResult()" disabled>查看完整分析 →</button>
    </div>

    <!-- 結果畫面（T7 核心解鎖）-->
    <div class="screen" id="screen-result">
      <div class="ornament" style="margin-bottom:32px">
        <span class="orn-line orn-line-l"></span>
        <span class="orn-diamond"></span>
        <span class="orn-line orn-line-r"></span>
      </div>

      <!-- T7 核心解鎖動畫元件 -->
      <div class="core-wrap" id="core-wrap">
        <div class="core-ray" style="--angle:0deg;--delay:.05s"></div>
        <div class="core-ray" style="--angle:30deg;--delay:.10s"></div>
        <div class="core-ray" style="--angle:60deg;--delay:.15s"></div>
        <div class="core-ray" style="--angle:90deg;--delay:.05s"></div>
        <div class="core-ray" style="--angle:120deg;--delay:.10s"></div>
        <div class="core-ray" style="--angle:150deg;--delay:.15s"></div>
        <div class="core-ring r3"></div>
        <div class="core-ring r2"></div>
        <div class="core-ring r1"></div>
        <div class="core-glow"></div>
        <div class="core-dot"></div>
      </div>

      <!-- 結果文字（動畫後淡入）-->

    cta:      '留下 Email，我寄給你針對「完美主義型」的自我鬆綁練習。'
  }
};
</script>

<script>
/* 初始化文案 */
document.getElementById('quiz-title').textContent = QUIZ_INFO.title;

document.title = 'MORI — ' + QUIZ_INFO.title;

/* 狀態 */
let currentQ = 0;
let answersHistory = [];
const scores = {};
let currentResultKey = null;
let surveyAnswers = { 1: '', 2: '', 3: '' };
const CFG = {
  lineUrl: 'https://line.me/R/ti/p/@507wvwbz',
  igUrl:   'https://instagram.com/mori1024_',
};
function openLine() { window.open(CFG.lineUrl, '_blank'); }
function openIG()   { window.open(CFG.igUrl,   '_blank'); }
/* ── PDF 下載（本機預覽無效，需 HTTPS 真實環境）── */
function buildShareHTML(r) {
  return '<div style="width:390px;background:#090705;font-family:\'Noto Sans TC\',\'PingFang TC\',sans-serif;color:#EDE8DF">' +
    '<div style="height:5px;background:linear-gradient(90deg,#C4A96A,#E8C86A)"></div>' +
    '<div style="padding:36px 28px 44px">' +
      '<p style="font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9A8C78;margin:0 0 24px">Mori · 診斷報告</p>' +
      '<h2 style="font-size:30px;font-weight:900;color:#EDE8DF;margin:0 0 10px;line-height:1.2">' + r.type + '</h2>' +
      '<p style="font-size:14px;color:#C4A96A;font-weight:500;margin:0 0 20px;line-height:1.6">' + r.subtitle + '</p>' +
      '<div style="height:1px;background:rgba(196,169,106,0.15);margin:0 0 20px"></div>' +
      '<p style="font-size:13px;color:#9A8C78;line-height:1.9;margin:0 0 32px">' + r.desc.substring(0,160) + '…</p>' +

function buildFullPDFHTML(r) {
  let h = '<div style="width:390px;background:#090705;font-family:\'Noto Sans TC\',\'PingFang TC\',sans-serif;color:#EDE8DF">' +
    '<div style="height:5px;background:linear-gradient(90deg,#C4A96A,#E8C86A)"></div>' +
    '<div style="padding:36px 28px 48px">' +
      '<p style="font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#9A8C78;margin:0 0 24px">Mori · 診斷報告</p>' +
      '<h2 style="font-size:30px;font-weight:900;color:#EDE8DF;margin:0 0 10px;line-height:1.2">' + r.type + '</h2>' +
      '<p style="font-size:14px;color:#C4A96A;font-weight:500;margin:0 0 24px;line-height:1.6">' + r.subtitle + '</p>' +
      '<div style="height:1px;background:rgba(196,169,106,0.15);margin:0 0 20px"></div>' +
      '<p style="font-size:13px;color:#9A8C78;line-height:1.9;margin:0 0 20px">' + r.desc + '</p>';

    h += '<p style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#C4A96A;text-transform:uppercase;margin:0 0 10px">深度分析</p>' +
      '<p style="font-size:12px;color:rgba(154,140,120,.85);line-height:1.9;margin:0 0 20px;white-space:pre-line">' + r.analysis + '</p>';
  }
  if (r.morview) {
    h += '<div style="border-left:2px solid rgba(196,169,106,.35);padding-left:16px;margin:0 0 24px">' +
      '<p style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#C4A96A;margin:0 0 8px">Mori 觀點</p>' +
      '<p style="font-size:12px;color:rgba(154,140,120,.85);line-height:1.9;margin:0">' + r.morview + '</p>' +
    '</div>';
  }
  h += '<p style="font-size:10px;color:rgba(154,140,120,0.4);letter-spacing:.06em;margin:0">mori-homepage.pages.dev</p>' +
    '</div></div>';

}
async function downloadPDF() {
  if (!currentResultKey) return;
  const r = RESULTS[currentResultKey];
  const target = document.getElementById('pdf-target');
  const btn = document.getElementById('dlBtn');
  const origHTML = btn ? btn.innerHTML : '';
  target.style.display = 'block';
  target.innerHTML = buildFullPDFHTML(r);
  if (btn) { btn.disabled = true; btn.textContent = '生成中…'; }
  try {
    await document.fonts.ready;
    const canvas = await html2canvas(target, { backgroundColor: '#090705', scale: 2, useCORS: true, logging: false });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const w = canvas.width / 2, h = canvas.height / 2;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [w, h] });
    pdf.addImage(imgData, 'PNG', 0, 0, w, h);
    pdf.save('mori-result-' + currentResultKey.toLowerCase() + '.pdf');
  } catch(e) { console.error(e); }
  finally {
    target.style.display = 'none';
    if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
  }
}

/* ── MailerLite 串接設定 ── */
/* 本機預覽無效，需在 HTTPS 真實環境才能運作 */
const KIT_MAPPING = {
  'M': { tag_id: 20663577, seq_id: 2807566 },
  'C': { tag_id: 20663578, seq_id: 2807567 },
  'D': { tag_id: 20663579, seq_id: 2807568 },
  'P': { tag_id: 20663580, seq_id: 2807569 },
  'A': { tag_id: 20663581, seq_id: 2807570 },
};
Object.keys(RESULTS).forEach(k => { scores[k] = 0; });

/* 畫面切換 */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  setTimeout(() => document.getElementById(id).classList.add('active'), 50);
}

/* 開始 */
function startQuiz() {
  currentQ = 0;
  answersHistory = [];
  surveyAnswers = { 1: '', 2: '', 3: '' };
  Object.keys(scores).forEach(k => { scores[k] = 0; });
  showScreen('screen-quiz');
  setTimeout(renderQuestion, 300);
}

/* 渲染題目 */
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  document.getElementById('q-num').textContent            = 'Q' + (currentQ + 1);
  document.getElementById('q-total').textContent          = '/ ' + total + ' 題';
  document.getElementById('progress-fill').style.width   = (currentQ / total * 100) + '%';
  document.getElementById('q-text').textContent           = q.text;

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-key">${opt.key}</span><span class="option-text">${opt.text}</span>`;
    btn.addEventListener('click', () => selectOption(btn, opt, i));
    wrap.appendChild(btn);
  });
  const prevIdx = answersHistory[currentQ];
  if (prevIdx !== undefined) {
    const opts = document.querySelectorAll('.option');
    if (opts[prevIdx]) opts[prevIdx].classList.add('selected');
  }
  const pb = document.getElementById('btnPrev');
  if (pb) pb.textContent = currentQ === 0 ? '← 返回首頁' : '← 上一題';
}

/* 選擇選項 */
function selectOption(el, opt, idx) {
  answersHistory[currentQ] = idx;
  document.querySelectorAll('.option').forEach((o, i) => {
    o.classList.add(i === idx ? 'selected' : 'fade-out');
  });
  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) renderQuestion();
    else showResult();
  }, 520);
}

/* ── 返回上一題 ── */
function prevQ() {
  if (currentQ === 0) { showScreen('screen-start'); return; }
  currentQ--;
  renderQuestion();
}

/* 顯示結果 + T7 核心解鎖動畫 */
function showResult() {
  const computed = {};
  Object.keys(RESULTS).forEach(k => { computed[k] = 0; });
  answersHistory.forEach((optIdx, qIdx) => {
    if (optIdx !== undefined && QUESTIONS[qIdx]) {
      Object.entries(QUESTIONS[qIdx].options[optIdx].scores).forEach(([k,v]) => {
        computed[k] = (computed[k] || 0) + v;
      });
    }
  });
  const topKey = Object.entries(computed).sort((a,b) => b[1]-a[1])[0][0];
  currentResultKey = topKey;
  const r = RESULTS[topKey];
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('s-type-name').textContent  = r.type;
  document.getElementById('s-type-brief').textContent = r.subtitle;
  surveyAnswers = { 1: '', 2: '', 3: '' };
  document.getElementById('btnUnlock').disabled = true;
  showScreen('screen-survey');
}

/* ── 副業意象調查門 ── */
function surveyPick(q, val, btn) {
  surveyAnswers[q] = val;
  btn.closest('.survey-group').querySelectorAll('.survey-opt').forEach(b => b.classList.remove('picked'));
  btn.classList.add('picked');
  if (surveyAnswers[1] && surveyAnswers[2] && surveyAnswers[3]) {
    document.getElementById('btnUnlock').disabled = false;
  }
}
function unlockResult() {
  renderFullResult();
  showScreen('screen-result');
}
function renderFullResult() {
  const r = RESULTS[currentResultKey];
  document.getElementById('r-type').textContent     = r.type;
  document.getElementById('r-subtitle').textContent = r.subtitle;
  document.getElementById('r-desc').textContent     = r.desc;
  document.getElementById('r-analysis').textContent = r.analysis || '';
  document.getElementById('r-morview').textContent  = r.morview  || '';
  if (r.cta) {
    document.getElementById('result-cta').style.display = 'block';
    document.getElementById('r-cta-text').textContent = r.cta;
  }
  /* T7：觸發核心解鎖，文字延遲顯示 */
  document.getElementById('result-text-block').classList.remove('visible');
  setTimeout(() => {
    const wrap = document.getElementById('core-wrap');
    wrap.classList.remove('is-unlocking');
    void wrap.offsetWidth;
    wrap.classList.add('is-unlocking');
    setTimeout(() => {
      document.getElementById('result-text-block').classList.add('visible');
    }, 1100);
  }, 400);
}

/* 動作 */
function retryQuiz() {
  document.getElementById('result-text-block').classList.remove('visible');
  document.getElementById('core-wrap').classList.remove('is-unlocking');
  showScreen('screen-start');
}
async function shareResult() {
  if (!currentResultKey) return;
  const r = RESULTS[currentResultKey];
  const target = document.getElementById('pdf-target');
  target.style.display = 'block';
  target.innerHTML = buildShareHTML(r);
  try {
    await document.fonts.ready;
    const canvas = await html2canvas(target, { backgroundColor: '#090705', scale: 2, useCORS: true, logging: false });
    canvas.toBlob(async (blob) => {
      const fname = 'mori-result-' + currentResultKey.toLowerCase() + '.png';
      const file = new File([blob], fname, { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Mori 測驗結果' });
      } else {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fname;
        a.click();
      }
    }, 'image/png');
  } catch(e) { console.error(e); }
  finally { target.style.display = 'none'; }
}

async function submitEmail() {
  const emailEl = document.getElementById('email-input');
  const email = emailEl.value.trim();
  if (!email || !email.includes('@')) return;
  const btn = document.querySelector('.btn-email');
  btn.disabled = true;
  btn.textContent = '送出中…';
  try {
    const { tag_id: _tid, seq_id: _sid } = KIT_MAPPING[currentResultKey] || {};
    const kitSubRes = await fetch('/api/kit/v4/subscribers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email_address: email }),
    });
    const kitSubId = kitSubRes.ok ? (await kitSubRes.json()).subscriber?.id : null;
    if (kitSubId && _tid) {
      await fetch(`/api/kit/v4/tags/${_tid}/subscribers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: kitSubId }),
      });
    }
    if (kitSubId && _sid) {
      await fetch(`/api/kit/v4/sequences/${_sid}/subscribers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: kitSubId }),
      });
    }
    if (kitSubRes.ok) {
      document.querySelector('.email-form').style.display = 'none';
      document.getElementById('email-done').style.display = 'block';
    } else {
      btn.disabled = false;
      btn.textContent = '送出';
    }
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '送出';
  }
}

/* Preloader + 游標 + 粒子 */
window.addEventListener('DOMContentLoaded', () => {
  const lL = document.getElementById('line-l');
  const lR = document.getElementById('line-r');
  const pt = document.getElementById('pre-text');

  setTimeout(() => { lL.classList.add('open'); lR.classList.add('open'); }, 200);
  setTimeout(() => { pt.classList.add('ready'); pt.textContent = 'Enter'; }, 1600);
  pt.addEventListener('click', () => {
    if (!pt.classList.contains('ready')) return;
    document.getElementById('preloader').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('preloader').style.display = 'none';
      document.getElementById('site').style.opacity = '1';
    }, 600);
  });

  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  (function tick(){ rx+=(mx-rx)*.18; ry+=(my-ry)*.18;
    cur.style.left=mx+'px'; cur.style.top=my+'px';
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(tick); })();
  document.querySelectorAll('button,a').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });

  MoriParticles.init('quiz');
});

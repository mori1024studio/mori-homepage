/* ══ 測驗頁專屬樣式 ══════════════════════════════════════════ */

/* ── 頁面骨架 ── */
#site { min-height: 100vh; display: flex; flex-direction: column; }
.quiz-main {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 100px 24px 80px;
}

/* ── 畫面切換動畫 ── */
.screen {
  width: 100%; max-width: 640px;
  opacity: 0; transform: translateY(20px);
  transition: opacity .5s ease, transform .5s ease;
  pointer-events: none; position: absolute;
}
.screen.active {
  opacity: 1; transform: translateY(0);
  pointer-events: auto; position: relative;
}

/* ── 開始畫面 ── */
.start-eyebrow {
  font-family: 'Noto Sans TC', sans-serif; font-size: 9px;
  letter-spacing: .5em; color: rgba(196,169,106,.55); margin-bottom: 20px;
  text-transform: uppercase;
}
.start-title {
  font-family: var(--font-display); font-weight: 900; font-size: 52px;
  background: linear-gradient(160deg, #FFF 0%, #D4B878 50%, #C4A96A 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1.15; margin-bottom: 28px;
}
.start-desc {
  font-family: 'LXGW WenKai TC', serif; font-size: 16px; line-height: 2;
  color: rgba(237,232,223,.55); margin-bottom: 48px;
}
.start-meta {
  font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: .25em;
  color: rgba(154,140,120,.4); margin-bottom: 48px;
}
.btn-start {
  display: inline-flex; align-items: center; gap: 16px;
  font-family: var(--font-body); font-size: 16px; letter-spacing: .25em; color: var(--gold);
  background: transparent; border: 1px solid rgba(196,169,106,.25);
  padding: 14px 36px; cursor: none; transition: all .3s;
}
.btn-start:hover { border-color: var(--gold); background: rgba(196,169,106,.06); }
.btn-start-arrow { display: block; width: 28px; height: 1px; background: var(--gold); transition: width .3s; }
.btn-start:hover .btn-start-arrow { width: 44px; }

/* ── 進度條 ── */
.progress-wrap { margin-bottom: 40px; }
.progress-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.progress-num {
  font-family: 'Kaushan Script', cursive; font-size: 22px; color: var(--gold);
}
.progress-total {
  font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .3em;
  color: rgba(154,140,120,.45); text-transform: uppercase;
}
.progress-bar-bg {
  height: 1px; background: rgba(196,169,106,.1); position: relative; overflow: visible;
}
.progress-bar-fill {
  height: 1px; background: var(--gold);
  transition: width .6s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.progress-bar-fill::after {
  content: ''; position: absolute; right: -3px; top: -3px;
  width: 7px; height: 7px; background: var(--gold); border-radius: 50%;
}

/* ── 問題 ── */
.question-tag {
  font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .4em;
  color: rgba(196,169,106,.4); text-transform: uppercase; margin-bottom: 20px;
}
.question-text {
  font-family: 'LXGW WenKai TC', serif; font-size: 24px; line-height: 1.75;
  color: var(--text); margin-bottom: 36px;
}

/* ── 選項 ── */
.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 14px 18px;
  background: rgba(16,12,8,.6); border: 1px solid rgba(196,169,106,.1);
  cursor: none; transition: all .25s; position: relative; overflow: hidden;
}
.option::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--gold); transform: scaleY(0); transform-origin: bottom;
  transition: transform .3s;
}
.option:hover { border-color: rgba(196,169,106,.28); background: rgba(16,12,8,.85); }
.option:hover::before { transform: scaleY(1); }
.option.selected { border-color: rgba(196,169,106,.4); background: rgba(196,169,106,.06); pointer-events: none; }
.option.selected::before { transform: scaleY(1); }
.option.fade-out { opacity: .25; transform: translateX(-6px); }
.option-key {
  font-family: 'Kaushan Script', cursive; font-size: 18px;
  color: rgba(196,169,106,.4); flex-shrink: 0; width: 20px;
  transition: color .25s;
}
.option:hover .option-key, .option.selected .option-key { color: var(--gold); }
.option-text {
  font-family: 'LXGW WenKai TC', serif; font-size: 15px; line-height: 1.7;
  color: rgba(237,232,223,.7); transition: color .25s;
}
.option:hover .option-text, .option.selected .option-text { color: var(--text); }

/* ── 結果畫面 ── */
.result-eyebrow {
  font-family: 'Noto Sans TC', sans-serif; font-size: 9px; letter-spacing: .5em;
  color: rgba(196,169,106,.45); text-transform: uppercase; margin-bottom: 16px;
}
.result-type {
  font-family: var(--font-display); font-weight: 900; font-size: 64px;

  line-height: 1.1; margin-bottom: 8px;
}
.result-subtitle {
  font-family: 'Noto Sans TC', sans-serif; font-size: 12px; letter-spacing: .35em;
  color: rgba(196,169,106,.6); text-transform: uppercase; margin-bottom: 32px;
}
.result-divider {
  width: 48px; height: 1px; background: rgba(196,169,106,.25); margin-bottom: 32px;
}
.result-desc {
  font-family: 'LXGW WenKai TC', serif; font-size: 17px; line-height: 2;
  color: rgba(237,232,223,.65); margin-bottom: 40px;
}
.result-actions { display: flex; gap: 16px; flex-wrap: wrap; }
.btn-share, .btn-retry {
  padding: 12px 28px; font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
  cursor: none; transition: all .25s;

.btn-share { background: rgba(196,169,106,.1); border: 1px solid rgba(196,169,106,.35); color: var(--gold); }
.btn-share:hover { background: rgba(196,169,106,.18); }
.btn-retry { background: transparent; border: 1px solid rgba(196,169,106,.12); color: rgba(154,140,120,.6); }
.btn-retry:hover { color: rgba(154,140,120,.9); border-color: rgba(196,169,106,.25); }

/* ── Email CTA（選用）── */

.email-form { display: flex; gap: 8px; }

.email-input:focus { border-color: rgba(196,169,106,.45); }

<script src="/shared/particles.js"></script>
<script>
/* ── 初始化頁面文案 ── */
document.getElementById('quiz-title').textContent = QUIZ_INFO.title;
document.getElementById('quiz-desc').textContent  = QUIZ_INFO.desc;
document.getElementById('quiz-meta').textContent  = QUIZ_INFO.meta;
document.querySelectorAll('.question-tag, #q-tag').forEach(el => { el.textContent = QUIZ_INFO.questionTag; });
document.title = 'MORI — ' + QUIZ_INFO.title;

/* ── 狀態 ── */
let currentQ = 0;
const scores = {};
Object.keys(RESULTS).forEach(k => { scores[k] = 0; });

/* ── 畫面切換 ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  setTimeout(() => document.getElementById(id).classList.add('active'), 50);
}

/* ── 開始測驗 ── */
function startQuiz() {
  currentQ = 0;
  Object.keys(scores).forEach(k => { scores[k] = 0; });
  showScreen('screen-quiz');
  setTimeout(renderQuestion, 300);
}

/* ── 渲染題目 ── */
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const total = QUESTIONS.length;
  const pct = (currentQ / total) * 100;

  document.getElementById('q-num').textContent  = 'Q' + (currentQ + 1);
  document.getElementById('q-total').textContent = '/ ' + total + ' 題';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-text').textContent = q.text;

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="option-key">${opt.key}</span><span class="option-text">${opt.text}</span>`;
    btn.addEventListener('click', () => selectOption(btn, opt, i));
    wrap.appendChild(btn);
  });
}

/* ── 選擇選項 ── */
function selectOption(el, opt, idx) {
  const allOpts = document.querySelectorAll('.option');
  allOpts.forEach((o, i) => {
    if (i === idx) o.classList.add('selected');
    else o.classList.add('fade-out');
  });

  /* 計分 */
  Object.entries(opt.scores).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 520);
}

/* ── 顯示結果 ── */
function showResult() {
  const topKey = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const r = RESULTS[topKey];

  document.getElementById('r-type').textContent     = r.type;
  document.getElementById('r-subtitle').textContent = r.subtitle;
  document.getElementById('r-desc').textContent     = r.desc;

  /* 進度條滿格 */
  document.getElementById('progress-fill').style.width = '100%';

  /* Email CTA（如果有設定則顯示）*/
  if (r.cta) {
    document.getElementById('result-cta').style.display = 'block';
    document.getElementById('r-cta-text').textContent = r.cta;
  }

  showScreen('screen-result');
}

/* ── 動作 ── */
function retryQuiz() { showScreen('screen-start'); }
function shareResult() {
  const type = document.getElementById('r-type').textContent;
  if (navigator.share) {
    navigator.share({ title: 'Mori 測驗結果', text: '我的測驗結果是「' + type + '」', url: location.href });
  } else {
    navigator.clipboard.writeText(location.href).then(() => alert('連結已複製'));
  }
}
function submitEmail() {
  const email = document.getElementById('email-input').value;
  if (!email) return;
  /* ★ 改這裡：接上 MailerLite API 或表單 */
  alert('謝謝！我會寄給你：' + email);
}

/* ── Preloader ── */
window.addEventListener('DOMContentLoaded', () => {
  const lL = document.getElementById('line-l');
  const lR = document.getElementById('line-r');
  const pt = document.getElementById('pre-text');

  setTimeout(() => { lL.classList.add('open'); lR.classList.add('open'); }, 200);
  setTimeout(() => { pt.classList.add('ready'); pt.textContent = 'Enter'; }, 1600);

  pt.addEventListener('click', () => {
    if (!pt.classList.contains('ready')) return;
    document.getElementById('preloader').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('preloader').style.display = 'none';
      document.getElementById('site').style.opacity = '1';
    }, 600);
  });

  /* 自訂游標 */
  const cur = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
  (function tick(){ rx+=(mx-rx)*.18; ry+=(my-ry)*.18;
    cur.style.left=mx+'px'; cur.style.top=my+'px';
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(tick); })();
  document.querySelectorAll('button,a').forEach(el => {
    el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
    el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
  });

  /* 粒子 */
  MoriParticles.init('quiz');
});
</script>
</body>
</html>
